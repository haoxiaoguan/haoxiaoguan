appId: com.haoxiaoguan.app
productName: 号小管
copyright: Copyright © 2026 haoxiaoguan

directories:
  output: release
  buildResources: build

# electron-vite 产物在 out/。用排除式:默认收 out/ + production node_modules,
# 剔除源码/配置/测试/文档,避免把开发文件打进包。
files:
  - '!**/.vscode/**'
  - '!src/**'
  - '!docs/**'
  - '!tests/**'
  - '!.omc/**'
  - '!.claude/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vitest.config.{js,ts}'
  - '!playwright.config.{js,ts}'
  - '!tsconfig*.json'
  - '!postcss.config.{js,cjs}'
  - '!tailwind.config.{js,ts,cjs}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,.gitignore,.prettierrc,.prettierrc.*,eslint.config.*}'
  - '!**/*.{test,spec}.{js,ts,jsx,tsx}'
  - '!**/*.map'

# 原生模块不能进 asar —— better-sqlite3 的 .node 必须留在文件系统由 require 加载。
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
  - '**/*.node'

# 项目自己用 `rebuild:electron`(electron-rebuild)把 better-sqlite3 编成 Electron ABI,
# 打包前 `npm run build` 已执行;这里关掉 electron-builder 的二次 rebuild,
# 避免在 pnpm 的 symlink 结构上重编出错。
npmRebuild: false

# 深链接协议(main.ts: setAsDefaultProtocolClient('haoxiaoguan'))
protocols:
  - name: 号小管 Deep Link
    schemes:
      - haoxiaoguan

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  # unsigned:不做 Apple 签名/公证(safeStorage 在未签名下仍可用)
  identity: null
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  artifactName: ${name}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${name}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: 号小管

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  synopsis: 号小管桌面端
  artifactName: ${name}-${version}-${arch}.${ext}
