name: Release

# 推送形如 v0.1.0（正式）或 v0.1.1-beta.1（预发布）的 tag 触发：electron-builder 三平台打包 + 发布到
# GitHub Releases。客户端 electron-updater 据打包进 app-update.yml 的 github provider 直连本仓 Releases
# 拉更新（仓库已公开 → 免 token）。发布类型按 tag 自动区分（见 publish 步骤）：
#   · 正式 tag(v0.1.1)  → draft：上传草稿，人工审核后「Publish」才放给所有用户（避免坏包直推）。
#   · 预发布 tag(-beta) → prerelease：直接发布并标 GitHub Pre-release。github provider 默认跳过
#     prerelease，故稳定客户端看不到；仅开了 allowPrerelease 的客户端能拉到，实现灰度。
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write # 创建 / 上传 Release 资产

jobs:
  release:
    name: Package & publish (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # 三平台并行：各 runner 按本机原生架构编译原生模块(better-sqlite3) 并产出对应安装包，
    # electron-builder 各自 publish 到同一个 Release（按 tag find-or-create，幂等）。
    # fail-fast:false → 某平台失败不连累其它平台。
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon → arm64：dmg + zip(自动更新通道)
            label: macOS arm64
            ebFlags: --mac --arm64
          - os: windows-latest # x64：nsis 安装器
            label: Windows x64
            ebFlags: --win --x64
          - os: ubuntu-latest # x64：AppImage + deb
            label: Linux x64
            ebFlags: --linux --x64
    steps:
      - uses: actions/checkout@v4

      # 不指定 version：以 package.json 的 packageManager(pnpm@10.32.1+sha512)为唯一来源，
      # 否则 action-setup@v4 会因「两处都指定 pnpm 版本」报 ERR_PNPM_BAD_PM_VERSION。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite + better-sqlite3 native ABI)
        run: pnpm run build

      - name: Package & publish to GitHub Releases
        # shell:bash 让 Windows runner 也能用 [[ ]]（Git Bash 自带）；mac/linux 默认就是 bash。
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 同仓 Release 写权限，免额外密钥
        # 含 `-` 的预发布 tag → prerelease（标 GitHub Pre-release，github provider 默认跳过，
        # 仅 allowPrerelease 客户端可见）；正式 tag → draft（人工 Publish 后放给所有用户）。
        # npmRebuild:false → 不二次 rebuild（build 步已用 electron-rebuild 编好原生模块）。
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then RT=prerelease; else RT=draft; fi
          echo "tag=${GITHUB_REF_NAME} platform='${{ matrix.label }}' → releaseType=$RT"
          pnpm exec electron-builder ${{ matrix.ebFlags }} --publish always -c.publish.releaseType=$RT

# ── 发布步骤（正式）──────────────────────────────────────────────────────────
# 1) 改 package.json version（如 0.1.1）→ commit。
# 2) git tag v0.1.1 && git push origin v0.1.1  → 本工作流三平台并行跑。
# 3) 跑完去 GitHub Releases，审核 draft（mac dmg/zip + win nsis + linux AppImage/deb 齐全），点 Publish。
# 4) 已装客户端启动/检查更新即从 GitHub 发现新版并下载。
#
# ── 预发布（beta 灰度）──────────────────────────────────────────────────────
# 1) 改 version 为预发布号（如 0.1.1-beta.1）→ commit。
# 2) git tag v0.1.1-beta.1 && git push origin v0.1.1-beta.1 → 自动跑，发布为 Pre-release。
# 3) 仅 allowPrerelease=true 的客户端会拉到，稳定用户不受影响。测完可在 Releases 直接删除该 Pre-release。
#
# ── 扩展架构（按需）─────────────────────────────────────────────────────────
# - mac x64(Intel)：matrix 加一项 `os: macos-13` + `ebFlags: --mac --x64`。
# - win arm64：matrix 加 `--win --arm64`（windows-latest 可交叉编，但原生模块需 arm64 预编译）。
#
# ── 签名注意 ────────────────────────────────────────────────────────────────
# 当前 unsigned(identity:null)。macOS 自动「下载后安装」走 Squirrel.Mac 需 app 已签名；unsigned 时
# 客户端改为「下载 dmg → 用户拖入 Applications」手动安装（见 updater-service）。Win(nsis)/Linux(AppImage)
# 未签名可正常自动更新（仅 SmartScreen/Gatekeeper 警告）。
